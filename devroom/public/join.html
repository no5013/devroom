<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devroom — join</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { color: #3fb950; font-size: 2rem; margin-bottom: 2rem; }
    .card {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      background: #161b22;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .label { color: #8b949e; font-size: 0.85rem; align-self: flex-start; }
    #avatar {
      width: 80px;
      height: 80px;
      border-radius: 4px;
      border: 1px solid #30363d;
      background: #0d1117;
    }
    #username {
      font-family: 'Courier New', monospace;
      color: #3fb950;
      font-size: 1.2rem;
      font-weight: bold;
    }
    #enter-btn {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    #enter-btn:hover:not(:disabled) { background: #3fb95020; }
    #enter-btn:disabled { border-color: #30363d; color: #484f58; cursor: not-allowed; }
    .footer { margin-top: 1.5rem; color: #484f58; font-size: 0.75rem; }
    #error { color: #f85149; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>&gt; devroom</h1>
  <div class="card">
    <span class="label">This is you:</span>
    <img id="avatar" alt="avatar">
    <span id="username">loading...</span>
    <button id="enter-btn" disabled>Enter Room →</button>
    <p id="error"></p>
  </div>
  <p class="footer">anonymous · no account needed</p>
  <script src="/js/join.js"></script>
</body>
</html>
