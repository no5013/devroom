<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devroom</title>
  <link rel="stylesheet" href="/lib/highlight.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/lib/confetti.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      padding: 1rem 0;
    }

    #session-name {
      color: #3fb950;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0 1rem 1rem 1rem;
      border-bottom: 1px solid #30363d;
      margin-bottom: 0.5rem;
    }

    #participants-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 0 0.5rem;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #c9d1d9;
    }

    .participant-item img {
      border-radius: 3px;
      flex-shrink: 0;
    }

    .participant-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Main chat area ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    /* ── Message ── */
    .message {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
      margin-bottom: 1rem;
      animation: slideInUp 0.2s ease;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
    }

    .message.instructor {
      border-left: 3px solid #f0883e;
      background: #1a1208;
      padding-left: calc(0.75rem - 3px);
    }

    .message-avatar {
      border-radius: 4px;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .message-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message-author {
      color: #3fb950;
      font-weight: bold;
      font-size: 0.85rem;
    }

    .instructor-badge {
      background: #f0883e22;
      color: #f0883e;
      border: 1px solid #f0883e55;
      font-size: 0.7rem;
      padding: 0 0.4rem;
      border-radius: 3px;
      font-weight: normal;
    }

    .message-text {
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      color: #c9d1d9;
    }

    .message-text .plain {
      white-space: pre-wrap;
    }

    .message-text pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.75rem;
      overflow-x: auto;
      margin: 0.25rem 0;
    }

    .message-text pre code {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      background: transparent;
      padding: 0;
    }

    /* ── Scroll button ── */
    #scroll-bottom-btn {
      position: absolute;
      bottom: 80px;
      right: 1.5rem;
      background: #161b22;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #scroll-bottom-btn:hover { background: #3fb95020; }

    /* ── Input area ── */
    #chat-form {
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #30363d;
      background: #161b22;
    }

    #chat-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      resize: none;
      overflow-y: hidden;
      line-height: 1.4;
      max-height: 120px;
    }

    #chat-input:focus {
      outline: none;
      border-color: #3fb950;
    }

    #send-btn {
      width: 80px;
      background: transparent;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: #3fb95020; }
    #send-btn:disabled { border-color: #30363d; color: #484f58; cursor: not-allowed; }

    /* ── Instructor panel ── */
    #instructor-panel {
      padding: 0.75rem 1rem;
      border-top: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #participant-count {
      font-size: 0.8rem;
      color: #8b949e;
    }

    #instructor-panel button {
      width: 100%;
      background: transparent;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #end-session-btn {
      border: 1px solid #f85149;
      color: #f85149;
    }

    #end-session-btn:hover:not(:disabled) { background: #f8514920; }
    #end-session-btn:disabled { border-color: #30363d; color: #484f58; cursor: not-allowed; }

    #create-poll-btn {
      border: 1px solid #30363d;
      color: #484f58;
      cursor: not-allowed;
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Sidebar: participant list -->
    <aside id="sidebar">
      <div id="session-name">devroom</div>
      <ul id="participants-list"><!-- .participant-item per person --></ul>
      <!-- Instructor panel: hidden by default, shown only for instructors -->
      <div id="instructor-panel" style="display:none">
        <div id="participant-count">0 online</div>
        <button id="end-session-btn">End Session</button>
        <button id="create-poll-btn" disabled title="Coming in US-04">Create Poll</button>
      </div>
    </aside>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="messages"><!-- .message divs appended here --></div>
      <button id="scroll-bottom-btn" hidden>↓ New messages</button>
      <form id="chat-form">
        <textarea id="chat-input" rows="1" placeholder="say something... (Shift+Enter for newline)"></textarea>
        <button id="send-btn" type="submit">Send</button>
      </form>
    </main>
  </div>
  <!-- Session ended modal: hidden by default -->
  <div id="session-ended-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; flex-direction:column;">
    <h2 style="color:#f85149">&gt; session ended</h2>
    <p style="color:#8b949e">The instructor has ended this session.</p>
  </div>
  <script src="/js/room.js"></script>
</body>
</html>
