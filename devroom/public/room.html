<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devroom</title>
  <link rel="stylesheet" href="/lib/highlight.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/lib/confetti.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      padding: 1rem 0;
    }

    #session-name {
      color: #3fb950;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0 1rem 1rem 1rem;
      border-bottom: 1px solid #30363d;
      margin-bottom: 0.5rem;
    }

    #participants-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 0 0.5rem;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #c9d1d9;
    }

    .participant-item img {
      border-radius: 3px;
      flex-shrink: 0;
    }

    .participant-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Main chat area ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    /* ── Message ── */
    .message {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
      margin-bottom: 1rem;
      animation: slideInUp 0.2s ease;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
    }

    .message.instructor {
      border-left: 3px solid #f0883e;
      background: #1a1208;
      padding-left: calc(0.75rem - 3px);
    }

    .message-avatar {
      border-radius: 4px;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .message-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message-author {
      color: #3fb950;
      font-weight: bold;
      font-size: 0.85rem;
    }

    .instructor-badge {
      background: #f0883e22;
      color: #f0883e;
      border: 1px solid #f0883e55;
      font-size: 0.7rem;
      padding: 0 0.4rem;
      border-radius: 3px;
      font-weight: normal;
    }

    .message-text {
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      color: #c9d1d9;
    }

    .message-text .plain {
      white-space: pre-wrap;
    }

    .message-text pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.75rem;
      overflow-x: auto;
      margin: 0.25rem 0;
    }

    .message-text pre code {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      background: transparent;
      padding: 0;
    }

    /* ── Scroll button ── */
    #scroll-bottom-btn {
      position: absolute;
      bottom: 80px;
      right: 1.5rem;
      background: #161b22;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #scroll-bottom-btn:hover { background: #3fb95020; }

    /* ── Input area ── */
    #chat-form {
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #30363d;
      background: #161b22;
    }

    #chat-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      resize: none;
      overflow-y: hidden;
      line-height: 1.4;
      max-height: 120px;
    }

    #chat-input:focus {
      outline: none;
      border-color: #3fb950;
    }

    #send-btn {
      width: 80px;
      background: transparent;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: #3fb95020; }
    #send-btn:disabled { border-color: #30363d; color: #484f58; cursor: not-allowed; }

    /* ── Instructor panel ── */
    #instructor-panel {
      padding: 0.75rem 1rem;
      border-top: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #participant-count {
      font-size: 0.8rem;
      color: #8b949e;
    }

    #instructor-panel button {
      width: 100%;
      background: transparent;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #end-session-btn {
      border: 1px solid #f85149;
      color: #f85149;
    }

    #end-session-btn:hover:not(:disabled) { background: #f8514920; }
    #end-session-btn:disabled { border-color: #30363d; color: #484f58; cursor: not-allowed; }

    #create-poll-btn {
      border: 1px solid #58a6ff;
      color: #58a6ff;
    }

    #create-poll-btn:hover:not(:disabled) { background: #58a6ff20; }
    #create-poll-btn:disabled { border-color: #30363d; color: #484f58; cursor: not-allowed; }

    /* ── Poll drawer ── */
    #poll-drawer {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.75rem;
      margin-top: 0.25rem;
      display: none;
    }

    #poll-drawer h3 {
      color: #58a6ff;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    #poll-question {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    #poll-question:focus { outline: none; border-color: #58a6ff; }

    .poll-option-row {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 0.3rem;
      align-items: center;
    }

    .poll-option-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
    }

    .poll-option-input:focus { outline: none; border-color: #58a6ff; }

    .remove-option-btn {
      background: transparent;
      border: 1px solid #f85149;
      color: #f85149;
      font-size: 0.7rem;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      cursor: pointer;
      width: auto !important;
      flex-shrink: 0;
    }

    .remove-option-btn:hover { background: #f8514920; }

    #add-option-btn {
      width: 100% !important;
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 0.3rem;
      border-radius: 3px;
      cursor: pointer;
      margin-bottom: 0.3rem;
    }

    #add-option-btn:hover:not(:disabled) { background: #30363d40; }
    #add-option-btn:disabled { color: #484f58; cursor: not-allowed; }

    #submit-poll-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #3fb950;
      color: #3fb950;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    #submit-poll-btn:hover { background: #3fb95020; }

    #cancel-poll-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    #cancel-poll-btn:hover { background: #30363d40; }

    /* ── Active poll overlay ── */
    #active-poll-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: #161b22;
      border-bottom: 2px solid #3fb950;
      padding: 1rem 1.5rem;
    }

    /* Vote buttons — large, tappable */
    .poll-vote-btn {
      min-height: 80px;
      min-width: 120px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      background: transparent;
      border: 2px solid #3fb950;
      color: #3fb950;
      border-radius: 6px;
      cursor: pointer;
      padding: 0.5rem 1rem;
      position: relative;
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
    }
    .poll-vote-btn:disabled {
      border-color: #30363d;
      color: #484f58;
      cursor: not-allowed;
    }
    .poll-vote-btn .btn-total { font-size: 0.75rem; color: #8b949e; }
    .poll-vote-btn .btn-personal { font-size: 0.7rem; color: #3fb950; }

    /* Bounce animation — class toggled per click */
    @keyframes btnBounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }
    .poll-vote-btn.bounce {
      animation: btnBounce 0.18s ease;
    }

    /* Poll closed label */
    #poll-closed-label {
      color: #f85149;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Bar chart rows */
    .bar-row {
      margin-bottom: 0.5rem;
    }
    .bar-label {
      font-size: 0.8rem;
      color: #c9d1d9;
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .bar-track {
      background: #21262d;
      border-radius: 3px;
      height: 12px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #3fb950;
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s ease;
    }
    /* ── Chat system messages (slash command feedback) ── */
    .chat-system-msg {
      font-size: 0.8rem;
      font-style: italic;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      margin: 0.25rem 0;
      align-self: flex-start;
    }
    .chat-error { color: #f85149; background: #1a0a0a; }
    .chat-info  { color: #8b949e; background: #161b22; }

    /* Projector mode */
    body.projector-mode {
      font-size: 1.5rem;
    }
    body.projector-mode #results-panel { font-size: 1.2rem; }
    body.projector-mode .bar-label { font-size: 1rem; }
    body.projector-mode .bar-track { height: 24px; }
    body.projector-mode .bar-fill { background: #ffffff; }

    /* Poll card area — sits between messages and input */
    #poll-card-area {
      flex-shrink: 0;
      padding: 0 0.5rem;
    }
    /* Poll card */
    .poll-card {
      border-left: 4px solid #3fb950;
      background: #0d1f12;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0;
    }
    .poll-card-frozen {
      opacity: 0.75;
      border-left-color: #484f58;
    }
    .poll-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .poll-badge {
      color: #3fb950;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .poll-card-question {
      color: #c9d1d9;
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 0.75rem;
    }
    .poll-card-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    #close-poll-btn-card {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border: 1px solid #f85149;
      color: #f85149;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
    }

    /* Poll option wrapper */
    .poll-option-wrapper {
      display: flex;
      flex-direction: column;
      min-width: 120px;
    }
    /* Percentage bar */
    .poll-bar-track {
      background: #21262d;
      border-radius: 3px;
      height: 10px;
      overflow: hidden;
      margin-top: 4px;
    }
    .poll-bar-fill {
      height: 100%;
      background: #3fb950;
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s ease;
    }
    /* Voter count */
    .poll-voter-count {
      font-size: 0.75rem;
      color: #8b949e;
    }
    /* Show results toggle */
    .poll-show-toggle {
      font-size: 0.7rem;
      padding: 0.2rem 0.4rem;
      border: 1px solid #58a6ff;
      color: #58a6ff;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
    }
    .poll-closed-label {
      color: #f85149;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Sidebar: participant list -->
    <aside id="sidebar">
      <div id="session-name">devroom</div>
      <ul id="participants-list"><!-- .participant-item per person --></ul>
      <!-- Instructor panel: hidden by default, shown only for instructors -->
      <div id="instructor-panel" style="display:none">
        <div id="participant-count">0 online</div>
        <button id="end-session-btn">End Session</button>

      </div>
    </aside>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="messages"><!-- .message divs appended here --></div>
      <button id="scroll-bottom-btn" hidden>↓ New messages</button>
      <div id="poll-card-area"></div>
      <form id="chat-form">
        <textarea id="chat-input" rows="1" placeholder="say something... (Shift+Enter for newline)"></textarea>
        <button id="send-btn" type="submit">Send</button>
      </form>
    </main>
  </div>
  <!-- Active poll overlay (kept for backwards-compat with older tests) -->
  <div id="active-poll-overlay" style="display:none !important; position:fixed; top:0; left:0; right:0; z-index:50; background:#161b22; border-bottom:2px solid #3fb950; padding:1rem 1.5rem;">
    <div id="poll-question-display" style="font-weight:bold; color:#c9d1d9; margin-bottom:0.75rem;"></div>
    <div id="poll-options-display" style="display:flex; flex-wrap:wrap; gap:0.75rem;"></div>
    <div id="poll-closed-label">Poll closed</div>
    <!-- Close button only shown to instructor -->
    <button id="close-poll-btn" style="display:none; margin-top:0.75rem; border-color:#f85149; color:#f85149;">Close Poll</button>
  </div>

  <!-- Session ended modal: hidden by default -->
  <div id="session-ended-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; flex-direction:column;">
    <h2 style="color:#f85149">&gt; session ended</h2>
    <p style="color:#8b949e">The instructor has ended this session.</p>
  </div>
  <script src="/js/room.js"></script>
</body>
</html>
